service: algonotes-backend-express

frameworkVersion: "4"

# ==========================================
# PROVIDER CONFIGURATION
# ==========================================
provider:
  name: aws
  runtime: nodejs20.x  
  region: ap-south-1
  stage: prod
  memorySize: 1024

  environment:
    ENVIRONMENT: production
    PORT: ${env:PORT}
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN}

    CLOUDINARY_CLOUD_NAME: ${env:CLOUDINARY_CLOUD_NAME}
    CLOUDINARY_API_KEY: ${env:CLOUDINARY_API_KEY}
    CLOUDINARY_API_SECRET: ${env:CLOUDINARY_API_SECRET}

    MAIL_SERVER: ${env:MAIL_SERVER}
    MAIL_PORT: ${env:MAIL_PORT}
    MAIL_USERNAME: ${env:MAIL_USERNAME}
    MAIL_PASSWORD: ${env:MAIL_PASSWORD}
    MAIL_FROM: ${env:MAIL_FROM}
    MAIL_FROM_NAME: ${env:MAIL_FROM_NAME}

    GEMINI_API_KEY: ${env:GEMINI_API_KEY}

    AI_GENERATION_QUEUE_URL:
      Ref: AiGenerationQueueExpress

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage 
            - sqs:DeleteMessage   
            - sqs:GetQueueAttributes
          Resource:
            Fn::GetAtt:
              - AiGenerationQueueExpress
              - Arn

# ==========================================
# LAMBDA FUNCTIONS
# ==========================================
functions:
  api:
    handler: src/app.handler  
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

  # Background Asynchronous SQS Worker (Express specific setup)
  aiWorker:
    handler: src/sqs/handler.handler  
    timeout: 300
    memorySize: 1024
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - AiGenerationQueueExpress
              - Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

# ==========================================
# CLOUDFORMATION RESOURCES (SQS)
# ==========================================
resources:
  Resources:
    AiGenerationQueueExpress:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: algonotes-ai-generation-queue-express
        VisibilityTimeout: 360
        MessageRetentionPeriod: 86400

# ==========================================
# PACKAGING POLICIES
# ==========================================
package:
  patterns:
    - "app.js" 
    - "src/**"  
    - "package.json"
    - "package-lock.json"
    - "!env/**"
    - "!venv/**"
    - "!.env"
    - "!Dockerfile"
    - "!.dockerignore"