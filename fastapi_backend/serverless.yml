service: algonotes-backend

frameworkVersion: "4"


# ==========================================
# PROVIDER CONFIGURATION
# ==========================================
provider:
  name: aws
  runtime: python3.12
  region: ap-south-1
  stage: prod
  memorySize: 1024

  environment:
    ENVIRONMENT: production
    PORT: ${env:PORT}
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN}

    CLOUDINARY_CLOUD_NAME: ${env:CLOUDINARY_CLOUD_NAME}
    CLOUDINARY_API_KEY: ${env:CLOUDINARY_API_KEY}
    CLOUDINARY_API_SECRET: ${env:CLOUDINARY_API_SECRET}

    MAIL_SERVER: ${env:MAIL_SERVER}
    MAIL_PORT: ${env:MAIL_PORT}
    MAIL_USERNAME: ${env:MAIL_USERNAME}
    MAIL_PASSWORD: ${env:MAIL_PASSWORD}
    MAIL_FROM: ${env:MAIL_FROM}
    MAIL_FROM_NAME: ${env:MAIL_FROM_NAME}

    GEMINI_API_KEY: ${env:GEMINI_API_KEY}

    AI_GENERATION_QUEUE_URL:
      Ref: AiGenerationQueue

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            Fn::GetAtt:
              - AiGenerationQueue
              - Arn

# ==========================================
# LAMBDA FUNCTIONS
# ==========================================
functions:
  # Main FastAPI Application Handler
  api:
    handler: main.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

  # Background Asynchronous SQS Worker
  aiWorker:
    handler: app.sqs.handler.handler
    timeout: 300
    memorySize: 1024
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - AiGenerationQueue
              - Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

# ==========================================
# CLOUDFORMATION RESOURCES (SQS)
# ==========================================
resources:
  Resources:
    AiGenerationQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: algonotes-ai-generation-queue
        VisibilityTimeout: 360
        MessageRetentionPeriod: 86400

# ==========================================
# CUSTOM PLUGINS CONFIGURATION
# ==========================================
custom:
  pythonRequirements:
    useDownloadCache: false
    useStaticCache: false
    pipCmdExtraArgs:
      - "--platform"
      - "manylinux2014_x86_64"
      - "--only-binary=:all:"
    slim: false

# ==========================================
# PACKAGING POLICIES
# ==========================================
package:
  patterns:
    - "app/**"              
    - "main.py"
    - "!env/**"
    - "!venv/**"
    - "!node_modules/**"
    - "!.env"
    - "!__pycache__/**"
    - "!Dockerfile"
    - "!.dockerignore"